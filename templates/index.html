<!DOCTYPE html>
<html lang="en">
<head>
<style>body {
  font-family: 'Roboto', sans-serif;
  background: linear-gradient(120deg, #a1c4fd, #c2e9fb);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.chat-container {
  width: 400px;
  height: 600px;
  background: #fff;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.chat-header {
  background: #2e86de;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

.chat-box {
  flex-grow: 1;
  padding: 15px;
  overflow-y: auto;
  background: #fefefe;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.user-msg, .bot-msg {
  max-width: 75%;
  padding: 10px 15px;
  border-radius: 18px;
  font-size: 14px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.user-msg {
  background: #dcf8c6;
  align-self: flex-end;
  border-bottom-right-radius: 0;
}

.bot-msg {
  background: #f1f0f0;
  align-self: flex-start;
  border-bottom-left-radius: 0;
}

.bot-avatar {
  width: 24px;
  height: 24px;
  border-radius: 50%;
}

#typing {
  font-style: italic;
  color: #888;
  padding-left: 5px;
}

.chat-input {
  display: flex;
  padding: 10px;
  border-top: 1px solid #ddd;
  gap: 10px;
}

.chat-input input {
  flex-grow: 1;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 20px;
  outline: none;
  font-size: 14px;
}

.chat-input button {
  padding: 10px 15px;
  background: #2e86de;
  color: white;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  transition: background 0.3s ease;
}

.chat-input button:hover {
  background: #1c60a7;
}
</style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>College Chatbot</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .chat-container {
      width: 400px;
      max-height: 90vh;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      background: #2e86de;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .chat-box {
      flex-grow: 1;
      padding: 15px;
      overflow-y: auto;
      background: #fdfdfd;
    }

    .user, .bot {
      margin: 10px 0;
      padding: 10px 15px;
      border-radius: 20px;
      max-width: 80%;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .user {
      background: #d1e7ff;
      align-self: flex-end;
    }

    .bot {
      background: #eeeeee;
      align-self: flex-start;
    }

    .chat-input {
      display: flex;
      border-top: 1px solid #ccc;
    }

    .chat-input input {
      flex-grow: 1;
      padding: 10px;
      border: none;
      border-radius: 0;
      outline: none;
      font-size: 16px;
    }

    .chat-input button {
      padding: 10px 20px;
      background: #2e86de;
      border: none;
      color: white;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .chat-input button:hover {
      background: #1c60a7;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">College Chatbot</div>
    <div class="chat-box" id="messages"></div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Ask me anything..." />
      <button onclick="getBotResponse()">Send</button>
    </div>
  </div>

  <script>
    async function getBotResponse() {
      const input = document.getElementById("userInput").value;
      if (!input.trim()) return;

      const messages = document.getElementById("messages");
      messages.innerHTML += `<div class="user">${input}</div>`;
      document.getElementById("userInput").value = "";

      const response = await fetch("https://college-chatbot-1-qsgu.onrender.com/get-response", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: input }),
      });

      const data = await response.json();
      messages.innerHTML += `<div class="bot">${data.reply}</div>`;
      messages.scrollTop = messages.scrollHeight;
    }
  </script>
</body>
</html>
